spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: inventory-management-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventory_management_db}
    username: ${DB_USERNAME:wms}
    password: ${DB_PASSWORD:wms}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    show-sql: ${DB_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: ${SERVER_PORT:8081}
  address: 0.0.0.0

# ── Eureka Client Configuration ──────────────────────────────────────────────
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://131.163.97.60:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    # Use the EC2 public IP so Eureka & Gateway can reach this service
    prefer-ip-address: true
    ip-address: ${INSTANCE_IP:35.88.199.189}
    # Unique instance-id to avoid conflicts on restart
    instance-id: ${spring.application.name}:${random.value}
    # Faster failure detection
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
